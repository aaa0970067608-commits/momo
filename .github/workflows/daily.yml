name: momo每日價格追蹤

on:
  schedule:
    - cron: '0 2 * * *'  # 台灣時間早上10點 (UTC 02:00)
  workflow_dispatch:      # 保留手動執行的按鈕，方便測試

jobs:
  scrape:
    runs-on: ubuntu-latest
    # 給予寫入權限，確保 git push 成功
    permissions:
      contents: write

    steps:
      - name: 檢出代碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝必要套件
        run: |
          python -m pip install --upgrade pip
          pip install playwright aiohttp

      - name: 一勞永逸安裝瀏覽器 (核心關鍵)
        # --with-deps 會自動安裝 Linux 系統缺少的函式庫
        # 直接指定 chromium，不依賴快取，版本絕對永遠正確
        run: playwright install chromium --with-deps

      - name: 執行爬蟲
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        # 加入 2>&1 確保錯誤訊息也能被完整記錄
        run: python main.py 2>&1

      - name: 儲存數據回 Repo (Git 自動化)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          # 檢查是否有檔案變動，有才 commit
          git add lowest.json last_run.txt || true
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "🤖 自動更新歷史價格 [$(date +'%Y-%m-%d %H:%M')]"
            git pull --rebase origin main
            git push origin HEAD:main
          else
            echo "沒有資料變動，跳過更新。"
          fi
